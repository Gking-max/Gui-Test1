<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSearch Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 CineSearch Pro</h1>
            <p>Search for any movie</p>
        </header>

        <!-- Search Section -->
        <div class="search-section" id="searchSection">
            <input type="text" id="searchInput" placeholder="Search for a movie..." autocomplete="off">
            <div class="loading-spinner"></div>
        </div>

        <!-- Results Section -->
        <div id="resultsContainer" class="results-container">
            <div class="empty-state">🔍 Start typing to search for movies</div>
        </div>

        <!-- Movie Detail Modal -->
        <div id="movieModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div id="movieDetailContent"></div>
            </div>
        </div>
    </div>

    <!-- Template for movie cards -->
    <template id="movieCardTemplate">
        <div class="movie-card">
            <img class="movie-poster" alt="">
            <div class="movie-info">
                <div class="movie-title"></div>
                <div class="movie-year"></div>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
